<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>লগইন - ব্যবসা ম্যানেজমেন্ট সফটওয়্যার</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#141b2d" />

  <!-- iOS ফুলস্ক্রিন সাপোর্ট -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BizManager" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="icon" href="./icons/icon-192.png" />

  <!-- ফন্ট -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="থিম পরিবর্তন">🌙</button>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <img src="./icons/icon-192.png" alt="Logo" id="brandLogo" />
        <h1>ব্যবসা ম্যানেজমেন্ট সফটওয়্যার</h1>
        <p>Ziaur Rahman &middot; সব ডিভাইসে চলে, অফলাইনেও কাজ করে</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">ইমেইল</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">পাসওয়ার্ড</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">লগইন করুন</button>
        <div class="error-text" id="errorBox"></div>
      </form>
    </div>
  </div>

  <div class="offline-badge" id="offlineBadge"></div>

  <!-- Firebase SDK (CDN থেকে - GitHub Pages এ কাজ করবে) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <script src="./js/firebase-config.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/auth.js"></script>

  <script>
    // Service Worker রেজিস্ট্রেশন - অফলাইন সাপোর্টের জন্য
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("./service-worker.js")
          .then(() => console.log("Service Worker রেজিস্টার সফল হয়েছে"))
          .catch((err) => console.error("Service Worker রেজিস্ট্রেশন ব্যর্থ:", err));
      });
    }
  </script>
</body>
</html>
