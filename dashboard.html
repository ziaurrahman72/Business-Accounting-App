<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>ড্যাশবোর্ড - ব্যবসা ম্যানেজমেন্ট সফটওয়্যার</title>
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#141b2d" />
  <link rel="icon" href="../icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .placeholder-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="placeholder-wrap">
    <h2>✅ লগইন সফল হয়েছে!</h2>
    <p style="color: var(--text-secondary)">
      পরবর্তী ধাপে এখানে সম্পূর্ণ Dashboard মডিউল (Sidebar, বিক্রয়/ক্রয় সামারি, চার্ট) তৈরি হবে।
    </p>
    <button class="btn-primary" style="width: auto; padding: 10px 20px;" onclick="auth.signOut().then(() => location.href='../index.html')">
      লগআউট
    </button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script>
    auth.onAuthStateChanged((user) => {
      if (!user) location.href = "../index.html";
    });
  </script>
</body>
</html>
